<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
    <!-- Social Media Preview Tags -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yopdude.github.io/welcomeJapan/">
    <meta property="og:title" content="Kitsune-kun's Japan Guide">
    <meta property="og:description" content="Ready to explore Japan? Take the quick quiz and download your travel cheat sheet!">
    <meta property="og:image" content="https://yopdude.github.io/welcomeJapan/images/social-preview.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://yopdude.github.io/welcomeJapan/">
    <meta name="twitter:title" content="Kitsune-kun's Japan Guide">
    <meta name="twitter:description" content="Ready to explore Japan? Take the quick quiz and download your travel cheat sheet!">
    <meta name="twitter:image" content="https://yopdude.github.io/welcomeJapan/images/social-preview.png">
    <title>Kitsune-kun's Japan Guide</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Varela Round', sans-serif; }
        .speech-bubble { position: relative; }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            margin-left: -10px;
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }
        /* Fixed height container to prevent layout jumping */
        .speech-container {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body class="bg-sky-300 text-white min-h-screen flex flex-col items-center p-4 sm:p-6 relative">
    <div class="flex flex-col items-center mb-2 mt-0">
        <!-- Increased image size from w-32/w-40 to w-40/w-48 -->
        <img src="images/kitsune-kun.png" alt="Kitsune-kun" class="w-40 h-40 sm:w-48 sm:h-48 mb-0">
        
        <!-- Speech container with reduced top margin -->
        <div class="speech-container px-4 mt-0">
            <div class="bg-white text-sky-600 p-4 rounded-3xl shadow-lg max-w-[280px] sm:max-w-xs relative text-center speech-bubble">
                <p id="kitsune-speech" class="text-sm sm:text-base">Konnichiwa! Ready to explore Japan? Check out the Cheat-Sheet below!</p>
            </div>
        </div>
    </div>

    <div id="quiz-box" class="w-full max-w-sm sm:max-w-lg bg-white/20 backdrop-blur-sm p-5 sm:p-6 rounded-3xl shadow-xl">
        <div id="home-screen">
            <h1 class="text-2xl sm:text-3xl font-bold mb-4 text-sky-900 text-center">Welcome!</h1>
            <p class="mb-6 text-center text-sm sm:text-base">Choose how you want to practice:</p>
            <div class="grid gap-3">
                <button onclick="startQuiz('quick')" title="5 random questions - a fast way to practice" class="bg-white text-sky-600 p-4 rounded-xl font-bold hover:bg-sky-50 transition flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 shrink-0"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z" /></svg>
                    <span>Quick Quiz</span>
                </button>
                <button onclick="startQuiz('final')" title="Every phrase, shuffled - score 85%+ to unlock Extras" class="bg-white text-sky-600 p-4 rounded-xl font-bold hover:bg-sky-50 transition flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 shrink-0"><path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.436 60.436 0 0 0-.491 6.347A48.627 48.627 0 0 1 12 20.904a48.627 48.627 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a50.57 50.57 0 0 0-2.658-.813A59.905 59.905 0 0 1 12 3.493a59.902 59.902 0 0 1 10.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.697 50.697 0 0 1 12 13.489a50.702 50.702 0 0 1 7.74-3.342M6.75 15a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm0 0v-3.675A55.378 55.378 0 0 1 12 8.443m-7.007 11.55A5.981 5.981 0 0 0 6.75 15.75v-1.5" /></svg>
                    <span>Final Exam</span>
                    <span id="final-exam-star" class="hidden">★</span>
                </button>
                <a id="extras-btn" href="extra.html" title="Art gallery and audio phrasebook" class="hidden text-center bg-emerald-600 text-white p-4 rounded-xl font-bold hover:bg-emerald-700 transition flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 shrink-0"><path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.321.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .321-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z" /></svg>
                    <span>View Extras ★</span>
                </a>
                <a id="cheat-sheet-btn" href="Japan_Travel_Cheat_Sheet.pdf" download onclick="markAsDownloaded()" title="Save the printable phrase & etiquette PDF" class="text-center bg-sky-600 text-white p-4 rounded-xl font-bold hover:bg-sky-700 transition flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 shrink-0"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
                    <span>Download Cheat-Sheet</span>
                </a>
            </div>
        </div>
        <div id="counter" class="text-sm mb-2 opacity-80 hidden text-center"></div>
        <div id="quiz-content"></div>
    </div>

    <script src="quizData.js" defer></script>
    <script src="main.js" defer></script>
</body>
</html>
