<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- FIX: Added viewport meta tag to fix zooming issues on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Social Media Preview Tags -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://yopdude.github.io/welcomeJapan/">
    <meta property="og:title" content="Kitsune-kun's Japan Guide">
    <meta property="og:description" content="Ready to explore Japan? Take the quick quiz and download your travel cheat sheet!">
    <meta property="og:image" content="https://yopdude.github.io/welcomeJapan/images/social-preview.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://yopdude.github.io/welcomeJapan/">
    <meta name="twitter:title" content="Kitsune-kun's Japan Guide">
    <meta name="twitter:description" content="Ready to explore Japan? Take the quick quiz and download your travel cheat sheet!">
    <meta name="twitter:image" content="https://yopdude.github.io/welcomeJapan/images/social-preview.png">

    <title>Kitsune-kun's Japan Guide</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Varela Round', sans-serif; }
        .speech-bubble { position: relative; }
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            margin-left: -10px;
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }
    </style>
</head>
<body class="bg-sky-300 text-white min-h-screen flex flex-col items-center p-4 sm:p-6 relative">

    <!-- Hint Guide: Hidden on mobile via 'hidden', shown on medium+ screens via 'md:block' -->
    <div id="hint-guide" class="fixed left-5 top-1/2 -mt-20 hidden md:block z-50">
        <div class="bg-white p-4 rounded-xl shadow-lg border-2 border-sky-600 text-sky-900 font-bold mb-4">
            Check out the Japan travel cheat sheet!
        </div>
        <svg width="200" height="200" class="absolute left-10">
            <path d="M 0 0 Q 50 150 150 150" stroke="#0284c7" stroke-width="3" stroke-dasharray="8 8" fill="none" />
            <path d="M 140 140 L 150 150 L 140 160" stroke="#0284c7" stroke-width="3" fill="none" />
        </svg>
    </div>

    <!-- Mascot & Speech Bubble -->
    <div class="flex flex-col items-center mb-8 mt-4">
        <img src="images/kitsune-kun.png" alt="Kitsune-kun" class="w-24 h-24 sm:w-32 sm:h-32 mb-4">
        <div class="h-auto min-h-[6rem] flex items-center justify-center px-4">
            <div class="bg-white text-sky-600 p-4 rounded-3xl shadow-lg max-w-[280px] sm:max-w-xs relative text-center speech-bubble">
                <p id="kitsune-speech" class="text-sm">Kon'nichiwa! Ready to explore Japan?</p>
            </div>
        </div>
    </div>

    <div id="quiz-box" class="w-full max-w-sm sm:max-w-lg bg-white/20 backdrop-blur-sm p-5 sm:p-6 rounded-3xl shadow-xl">
        <div id="home-screen">
            <h1 class="text-2xl sm:text-3xl font-bold mb-4 text-sky-900 text-center">Welcome!</h1>
            <p class="mb-6 text-center text-sm sm:text-base">Choose how you want to practice:</p>
            <div class="grid gap-3">
                <button onclick="startQuiz('quick')" class="bg-white text-sky-600 p-4 rounded-xl font-bold hover:bg-sky-50 transition">Quick Quiz</button>
                <button onclick="startQuiz('final')" class="bg-white text-sky-600 p-4 rounded-xl font-bold hover:bg-sky-50 transition">Final Exam</button>
                <a id="cheat-sheet-btn" href="Japan_Travel_Cheat_Sheet.pdf" download onclick="markAsDownloaded()" class="block text-center bg-sky-600 text-white p-4 rounded-xl font-bold hover:bg-sky-700 transition">Download Cheat-Sheet</a>
            </div>
        </div>
        <div id="counter" class="text-sm mb-2 opacity-80 hidden text-center"></div>
        <div id="quiz-content"></div>
    </div>

    <script src="quizData.js" defer></script>
    <script src="main.js" defer></script>
</body>
</html>
